<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Страница не найдена — Del Cappuccino</title>
<link rel="icon" type="image/png" href="assets/logo-mono.png">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-D50YPM8RMK"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag('js',new Date());gtag('config','G-D50YPM8RMK');</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@700&family=Golos+Text:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--forest:#426349;--forest-dk:#31492F;--cream:#FEF1E7;--olive:#849E29;--ink:#241C15;--ink-2:#5C5245;--line:rgba(66,99,73,.18)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--ink);font-family:'Golos Text',-apple-system,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;text-align:center}
img{height:48px;margin-bottom:32px}
p.tag{font-size:11.5px;text-transform:uppercase;letter-spacing:.14em;color:var(--olive);font-weight:700;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
p.tag::before{content:'';width:18px;height:2px;background:var(--olive);border-radius:2px}
h1{font-family:Comfortaa;font-weight:700;font-size:42px;line-height:1.1;color:var(--forest-dk);margin-bottom:12px}
h1 span{color:var(--olive)}
p.lead{font-size:15px;color:var(--ink-2);line-height:1.65;max-width:340px;margin:0 auto 32px}
a.btn{display:inline-flex;align-items:center;gap:6px;background:var(--forest);color:var(--cream);padding:13px 26px;border-radius:99px;text-decoration:none;font-size:14px;font-weight:700;transition:background .15s}
a.btn:hover{background:var(--forest-dk)}
footer{position:fixed;bottom:20px;font-size:12px;color:var(--ink-2)}
</style>
</head>
<body>
  <img src="assets/logo-mono.png" alt="Del Cappuccino">
  <p class="tag">ошибка 404</p>
  <h1>Такой страницы<br>нет <span>в меню</span>.</h1>
  <p class="lead">Возможно, ссылка устарела или была удалена. Зато у нас есть кофе.</p>
  <a class="btn" href="/">На главную</a>
  <footer>coffee & food · Алматы</footer>
</body>
</html>
